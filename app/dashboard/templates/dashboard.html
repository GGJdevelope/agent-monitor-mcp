<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Monitor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-tooltip {
            position: fixed;
            z-index: 1000;
            background: #1f2937;
            color: white;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            max-width: 24rem;
            word-wrap: break-word;
            pointer-events: none;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="tooltip" class="custom-tooltip"></div>
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Agent Monitor Dashboard</h1>
            <p class="text-gray-600">Real-time status of all active agents</p>
        </header>

        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <table class="min-w-full leading-normal">
                <thead>
                    <tr>
                        <th class="px-3 py-2 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Agent ID</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Location</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Branch</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Run / Task</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Status</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Progress</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Last Message</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Updated</th>
                    </tr>
                </thead>
                <tbody id="agent-table-body">
                    <!-- Data populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const agents = new Map();
        const expandedRows = new Set();
        const instanceDetails = new Map();
        const tooltip = document.getElementById('tooltip');

        function showTooltip(event, text) {
            if (!text || text === '-') return;
            tooltip.textContent = text;
            tooltip.style.display = 'block';
            
            // Position the tooltip near the mouse, but within viewport
            const padding = 15;
            let x = event.clientX + padding;
            let y = event.clientY + padding;
            
            // Basic viewport overflow check
            const tooltipRect = tooltip.getBoundingClientRect();
            if (x + tooltipRect.width > window.innerWidth) {
                x = event.clientX - tooltipRect.width - padding;
            }
            if (y + tooltipRect.height > window.innerHeight) {
                y = event.clientY - tooltipRect.height - padding;
            }
            
            tooltip.style.left = `${x}px`;
            tooltip.style.top = `${y}px`;
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        function getStatusColor(status) {
            switch (status.toLowerCase()) {
                case 'queued': return 'bg-gray-200 text-gray-800';
                case 'running': return 'bg-blue-100 text-blue-800';
                case 'completed': return 'bg-green-100 text-green-800';
                case 'failed': return 'bg-red-100 text-red-800';
                case 'cancelled': return 'bg-yellow-100 text-yellow-800';
                case 'stale': return 'bg-orange-100 text-orange-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        async function toggleDetails(instanceId) {
            if (expandedRows.has(instanceId)) {
                expandedRows.delete(instanceId);
                renderAgents();
            } else {
                expandedRows.add(instanceId);
                instanceDetails.set(instanceId, { loading: true });
                renderAgents();
                
                try {
                    const response = await fetch(`/api/agents/instances/${instanceId}`);
                    if (response.ok) {
                        const details = await response.json();
                        instanceDetails.set(instanceId, details);
                    } else {
                        instanceDetails.set(instanceId, { error: true });
                    }
                } catch (err) {
                    console.error("Failed to fetch instance details", err);
                    instanceDetails.set(instanceId, { error: true });
                }
                renderAgents();
            }
        }

        function renderAgents() {
            const tbody = document.getElementById('agent-table-body');
            tbody.innerHTML = '';
            
            const sortedAgents = Array.from(agents.values()).sort((a, b) => 
                new Date(b.updated_at) - new Date(a.updated_at)
            );

            if (agents.size === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-5 py-10 text-center text-gray-500">No agents reporting yet</td></tr>';
                return;
            }

            sortedAgents.forEach(agent => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors cursor-pointer';
                const instanceId = agent.instance_id || agent.agent_id;
                row.onclick = () => toggleDetails(instanceId);
                
                const timeStr = new Date(agent.updated_at).toLocaleTimeString();
                const shortLocation = agent.location_label || '-';
                const branchStr = agent.branch || '-';
                
                row.innerHTML = `
                    <td class="px-3 py-3 border-b border-gray-200 text-sm">
                        <p class="text-gray-900 whitespace-no-wrap font-mono truncate w-24" title="${agent.agent_id}">${agent.agent_id}</p>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 text-sm">
                        <p class="text-gray-900 whitespace-no-wrap" title="${shortLocation}">${shortLocation}</p>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 text-sm">
                        <span class="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs">${branchStr}</span>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 text-sm">
                        <p class="text-gray-900 font-bold truncate w-40 hover:text-blue-600 transition-colors" 
                           onmouseenter="showTooltip(event, this.textContent)" 
                           onmouseleave="hideTooltip()">${agent.task_name}</p>
                        <p class="text-gray-600 text-xs font-mono truncate w-24" title="${agent.run_id}">${agent.run_id}</p>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 text-sm">
                        <span class="relative inline-block px-2 py-1 font-semibold leading-tight rounded-full text-xs ${getStatusColor(agent.status)}">
                            ${agent.status}
                        </span>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 text-sm">
                        <div class="w-20 bg-gray-200 rounded-full h-2 mb-1">
                            <div class="bg-blue-600 h-2 rounded-full" style="width: ${agent.progress}%"></div>
                        </div>
                        <p class="text-gray-600 text-xs">${agent.progress}%</p>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 text-sm">
                        <p class="text-gray-900 truncate w-48 hover:text-blue-600 transition-colors"
                           onmouseenter="showTooltip(event, this.textContent)" 
                           onmouseleave="hideTooltip()">${agent.message || '-'}</p>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 text-sm text-right">
                        <p class="text-gray-900 whitespace-no-wrap text-xs">${timeStr}</p>
                    </td>
                `;
                tbody.appendChild(row);

                if (expandedRows.has(instanceId)) {
                    const detailsRow = document.createElement('tr');
                    detailsRow.className = 'bg-gray-50 border-b border-gray-200';
                    const details = instanceDetails.get(instanceId);
                    
                    if (details && !details.loading && !details.error) {
                        detailsRow.innerHTML = `
                            <td colspan="8" class="px-4 py-4">
                                <div class="grid grid-cols-2 gap-4 text-sm">
                                    <div><span class="font-bold text-gray-600">Instance ID:</span> <span class="font-mono">${details.instance_id || 'N/A'}</span></div>
                                    <div><span class="font-bold text-gray-600">Agent ID:</span> <span class="font-mono">${details.agent_id}</span></div>
                                    <div><span class="font-bold text-gray-600">Working Dir:</span> <span class="break-all">${details.working_dir || 'N/A'}</span></div>
                                    <div><span class="font-bold text-gray-600">Branch:</span> <span>${details.branch || 'N/A'}</span></div>
                                    <div><span class="font-bold text-gray-600">Run ID:</span> <span class="font-mono">${details.run_id}</span></div>
                                    <div><span class="font-bold text-gray-600">Task Name:</span> <span>${details.task_name}</span></div>
                                    <div><span class="font-bold text-gray-600">First Seen:</span> <span>${details.first_seen_at ? new Date(details.first_seen_at).toLocaleString() : 'N/A'}</span></div>
                                    <div><span class="font-bold text-gray-600">Updated At:</span> <span>${new Date(details.updated_at).toLocaleString()}</span></div>
                                </div>
                            </td>
                        `;
                    } else if (details && details.error) {
                        detailsRow.innerHTML = `
                            <td colspan="8" class="px-4 py-4 text-center text-red-500">
                                Failed to load instance details
                            </td>
                        `;
                    } else {
                        detailsRow.innerHTML = `
                            <td colspan="8" class="px-4 py-4 text-center text-gray-500">
                                Loading details...
                            </td>
                        `;
                    }
                    tbody.appendChild(detailsRow);
                }
            });
        }

        async function fetchInitialState() {
            try {
                const response = await fetch('/api/agents');
                const data = await response.json();
                data.forEach(agent => agents.set(agent.instance_id || agent.agent_id, agent));
                renderAgents();
            } catch (err) {
                console.error("Failed to fetch initial state", err);
            }
        }

        function connectSSE() {
            const eventSource = new EventSource('/api/stream');
            
            eventSource.addEventListener('status_update', (event) => {
                const data = JSON.parse(event.data);
                agents.set(data.instance_id || data.agent_id, data);
                renderAgents();
            });

            eventSource.onerror = (err) => {
                console.error("SSE connection error, retrying...", err);
                eventSource.close();
                setTimeout(connectSSE, 3000);
            };
        }

        fetchInitialState();
        connectSSE();
    </script>
</body>
</html>
