<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Monitor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .custom-tooltip {
            position: fixed;
            z-index: 1000;
            background: #1f2937;
            color: white;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            max-width: 24rem;
            word-wrap: break-word;
            pointer-events: none;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .dark .custom-tooltip {
            background: #374151;
            border: 1px solid #4b5563;
        }
    </style>
    <script>
        // Apply theme as early as possible to avoid flash
        (function() {
            const savedTheme = localStorage.getItem('dashboard-theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen transition-colors duration-200">
    <div id="tooltip" class="custom-tooltip"></div>
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100">Agent Monitor Dashboard</h1>
                <p class="text-gray-600 dark:text-gray-400">Real-time status of all active agents</p>
            </div>
            <button id="theme-toggle" 
                    class="p-2 rounded-lg bg-white dark:bg-gray-800 shadow-md border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                    aria-label="Toggle dark mode">
                <svg id="sun-icon" class="hidden dark:block w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9h-1m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <svg id="moon-icon" class="block dark:hidden w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
            </button>
        </header>

        <!-- Desktop View (Hidden on mobile) -->
        <div class="hidden md:block bg-white dark:bg-gray-800 shadow-md rounded-lg overflow-hidden border border-gray-200 dark:border-gray-700">
            <table class="min-w-full leading-normal">
                <thead>
                    <tr>
                        <th class="px-3 py-2 border-b-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 text-left text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">Agent ID</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 text-left text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">Location</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 text-left text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">Branch</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 text-left text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">Run / Task</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 text-left text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">Status</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 text-left text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">Progress</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 text-left text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">Last Message</th>
                        <th class="px-3 py-2 border-b-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/50 text-left text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">Updated</th>
                    </tr>
                </thead>
                <tbody id="agent-table-body">
                    <!-- Data populated by JS -->
                </tbody>
            </table>
        </div>

        <!-- Mobile View (Hidden on md and larger) -->
        <div id="agent-cards-container" class="md:hidden space-y-4">
            <!-- Data populated by JS -->
        </div>
    </div>

    <script>
        const agents = new Map();
        const expandedRows = new Set();
        const instanceDetails = new Map();
        const abortControllers = new Map();
        const tooltip = document.getElementById('tooltip');

        function clampProgress(progress) {
            const val = parseFloat(progress);
            if (isNaN(val)) return 0;
            return Math.min(Math.max(val, 0), 100);
        }

        function escapeHtml(unsafe) {
            if (unsafe == null) return '';
            return String(unsafe)
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function showTooltip(event, text) {
            if (!text || text === '-') return;
            tooltip.textContent = text;
            tooltip.style.display = 'block';
            
            // Position the tooltip near the mouse, but within viewport
            const padding = 15;
            let x = event.clientX + padding;
            let y = event.clientY + padding;
            
            // Basic viewport overflow check
            const tooltipRect = tooltip.getBoundingClientRect();
            if (x + tooltipRect.width > window.innerWidth) {
                x = event.clientX - tooltipRect.width - padding;
            }
            if (y + tooltipRect.height > window.innerHeight) {
                y = event.clientY - tooltipRect.height - padding;
            }
            
            tooltip.style.left = `${x}px`;
            tooltip.style.top = `${y}px`;
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        function getStatusColor(status) {
            switch (status.toLowerCase()) {
                case 'queued': return 'bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-gray-300';
                case 'running': return 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300';
                case 'completed': return 'bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300';
                case 'failed': return 'bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300';
                case 'cancelled': return 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/40 dark:text-yellow-300';
                case 'stale': return 'bg-orange-100 text-orange-800 dark:bg-orange-900/40 dark:text-orange-300';
                default: return 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300';
            }
        }

        async function toggleDetails(instanceId) {
            if (expandedRows.has(instanceId)) {
                expandedRows.delete(instanceId);
                // Abort any pending request for this instance when collapsing
                if (abortControllers.has(instanceId)) {
                    abortControllers.get(instanceId).abort();
                    abortControllers.delete(instanceId);
                }
                renderAgents();
            } else {
                expandedRows.add(instanceId);
                instanceDetails.set(instanceId, { loading: true });
                renderAgents();
                
                // Abort any previous request for this instance
                if (abortControllers.has(instanceId)) {
                    abortControllers.get(instanceId).abort();
                }
                const controller = new AbortController();
                abortControllers.set(instanceId, controller);

                try {
                    const response = await fetch(`/api/agents/instances/${instanceId}`, { signal: controller.signal });
                    if (response.ok) {
                        const details = await response.json();
                        instanceDetails.set(instanceId, details);
                    } else {
                        instanceDetails.set(instanceId, { error: true });
                    }
                } catch (err) {
                    if (err.name === 'AbortError') return;
                    console.error("Failed to fetch instance details", err);
                    instanceDetails.set(instanceId, { error: true });
                } finally {
                    if (abortControllers.get(instanceId) === controller) {
                        abortControllers.delete(instanceId);
                    }
                }
                renderAgents();
            }
        }

        function renderAgents() {
            hideTooltip();
            const tbody = document.getElementById('agent-table-body');
            const mobileContainer = document.getElementById('agent-cards-container');
            
            tbody.innerHTML = '';
            mobileContainer.innerHTML = '';
            
            const sortedAgents = Array.from(agents.values()).sort((a, b) => 
                new Date(b.updated_at) - new Date(a.updated_at)
            );

            if (agents.size === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-5 py-10 text-center text-gray-500 dark:text-gray-400">No agents reporting yet</td></tr>';
                mobileContainer.innerHTML = '<div class="p-8 text-center text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800 rounded-lg shadow-md border border-gray-200 dark:border-gray-700">No agents reporting yet</div>';
                return;
            }

            sortedAgents.forEach(agent => {
                const instanceId = agent.instance_id || agent.agent_id;
                const timeStr = new Date(agent.updated_at).toLocaleTimeString();
                const shortLocation = agent.location_label || '-';
                const branchStr = agent.branch || '-';
                const isExpanded = expandedRows.has(instanceId);
                const progress = clampProgress(agent.progress);
                
                // Desktop Table Row
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors cursor-pointer';
                row.addEventListener('click', () => toggleDetails(instanceId));
                
                row.innerHTML = `
                    <td class="px-3 py-3 border-b border-gray-200 dark:border-gray-700 text-sm">
                        <p class="text-gray-900 dark:text-gray-100 whitespace-no-wrap font-mono truncate w-24" title="${escapeHtml(agent.agent_id)}">${escapeHtml(agent.agent_id)}</p>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 dark:border-gray-700 text-sm">
                        <p class="text-gray-900 dark:text-gray-100 whitespace-no-wrap" title="${escapeHtml(shortLocation)}">${escapeHtml(shortLocation)}</p>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 dark:border-gray-700 text-sm">
                        <span class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 px-2 py-1 rounded text-xs">${escapeHtml(branchStr)}</span>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 dark:border-gray-700 text-sm">
                        <p class="text-gray-900 dark:text-gray-100 font-bold truncate w-40 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" 
                           onmouseenter="showTooltip(event, this.textContent)" 
                           onmouseleave="hideTooltip()">${escapeHtml(agent.task_name)}</p>
                        <p class="text-gray-600 dark:text-gray-400 text-xs font-mono truncate w-24" title="${escapeHtml(agent.run_id)}">${escapeHtml(agent.run_id)}</p>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 dark:border-gray-700 text-sm">
                        <span class="relative inline-block px-2 py-1 font-semibold leading-tight rounded-full text-xs ${getStatusColor(agent.status)}">
                            ${escapeHtml(agent.status)}
                        </span>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 dark:border-gray-700 text-sm">
                        <div class="w-20 bg-gray-200 dark:bg-gray-700 rounded-full h-2 mb-1">
                            <div class="bg-blue-600 dark:bg-blue-500 h-2 rounded-full" style="width: ${progress}%"></div>
                        </div>
                        <p class="text-gray-600 dark:text-gray-400 text-xs">${progress}%</p>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 dark:border-gray-700 text-sm">
                        <p class="text-gray-900 dark:text-gray-100 truncate w-48 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
                           onmouseenter="showTooltip(event, this.textContent)" 
                           onmouseleave="hideTooltip()">${escapeHtml(agent.message || '-')}</p>
                    </td>
                    <td class="px-3 py-3 border-b border-gray-200 dark:border-gray-700 text-sm text-right">
                        <p class="text-gray-900 dark:text-gray-100 whitespace-no-wrap text-xs">${timeStr}</p>
                    </td>
                `;
                tbody.appendChild(row);

                if (isExpanded) {
                    const detailsRow = document.createElement('tr');
                    detailsRow.className = 'bg-gray-50 dark:bg-gray-900/30 border-b border-gray-200 dark:border-gray-700';
                    const details = instanceDetails.get(instanceId);
                    
                    if (details && !details.loading && !details.error) {
                        detailsRow.innerHTML = `
                            <td colspan="8" class="px-4 py-4">
                                <div class="grid grid-cols-2 gap-4 text-sm">
                                    <div><span class="font-bold text-gray-600 dark:text-gray-400">Instance ID:</span> <span class="font-mono text-gray-800 dark:text-gray-200">${escapeHtml(details.instance_id || 'N/A')}</span></div>
                                    <div><span class="font-bold text-gray-600 dark:text-gray-400">Agent ID:</span> <span class="font-mono text-gray-800 dark:text-gray-200">${escapeHtml(details.agent_id)}</span></div>
                                    <div><span class="font-bold text-gray-600 dark:text-gray-400">Working Dir:</span> <span class="break-all text-gray-800 dark:text-gray-200">${escapeHtml(details.working_dir || 'N/A')}</span></div>
                                    <div><span class="font-bold text-gray-600 dark:text-gray-400">Branch:</span> <span class="text-gray-800 dark:text-gray-200">${escapeHtml(details.branch || 'N/A')}</span></div>
                                    <div><span class="font-bold text-gray-600 dark:text-gray-400">Run ID:</span> <span class="font-mono text-gray-800 dark:text-gray-200">${escapeHtml(details.run_id)}</span></div>
                                    <div><span class="font-bold text-gray-600 dark:text-gray-400">Task Name:</span> <span class="text-gray-800 dark:text-gray-200">${escapeHtml(details.task_name)}</span></div>
                                    <div><span class="font-bold text-gray-600 dark:text-gray-400">First Seen:</span> <span class="text-gray-800 dark:text-gray-200">${details.first_seen_at ? new Date(details.first_seen_at).toLocaleString() : 'N/A'}</span></div>
                                    <div><span class="font-bold text-gray-600 dark:text-gray-400">Updated At:</span> <span class="text-gray-800 dark:text-gray-200">${new Date(details.updated_at).toLocaleString()}</span></div>
                                </div>
                            </td>
                        `;
                    } else if (details && details.error) {
                        detailsRow.innerHTML = `
                            <td colspan="8" class="px-4 py-4 text-center text-red-500 dark:text-red-400">
                                Failed to load instance details
                            </td>
                        `;
                    } else {
                        detailsRow.innerHTML = `
                            <td colspan="8" class="px-4 py-4 text-center text-gray-500 dark:text-gray-400">
                                Loading details...
                            </td>
                        `;
                    }
                    tbody.appendChild(detailsRow);
                }

                // Mobile Card
                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-gray-800 shadow rounded-lg p-4 flex flex-col space-y-3 border border-gray-200 dark:border-gray-700';
                
                let detailsHtml = '';
                if (isExpanded) {
                    const details = instanceDetails.get(instanceId);
                    if (details && !details.loading && !details.error) {
                        detailsHtml = `
                            <div class="mt-3 pt-3 border-t border-gray-100 dark:border-gray-700 flex flex-col space-y-2 text-sm bg-gray-50 dark:bg-gray-900/50 p-3 rounded">
                                <div><span class="font-bold text-gray-600 dark:text-gray-400">Instance ID:</span> <span class="font-mono break-all text-gray-800 dark:text-gray-200">${escapeHtml(details.instance_id || 'N/A')}</span></div>
                                <div><span class="font-bold text-gray-600 dark:text-gray-400">Agent ID:</span> <span class="font-mono text-gray-800 dark:text-gray-200">${escapeHtml(details.agent_id)}</span></div>
                                <div><span class="font-bold text-gray-600 dark:text-gray-400">Working Dir:</span> <span class="break-all text-gray-800 dark:text-gray-200">${escapeHtml(details.working_dir || 'N/A')}</span></div>
                                <div><span class="font-bold text-gray-600 dark:text-gray-400">Branch:</span> <span class="text-gray-800 dark:text-gray-200">${escapeHtml(details.branch || 'N/A')}</span></div>
                                <div><span class="font-bold text-gray-600 dark:text-gray-400">Run ID:</span> <span class="font-mono text-gray-800 dark:text-gray-200">${escapeHtml(details.run_id)}</span></div>
                                <div><span class="font-bold text-gray-600 dark:text-gray-400">Task Name:</span> <span class="text-gray-800 dark:text-gray-200">${escapeHtml(details.task_name)}</span></div>
                                <div><span class="font-bold text-gray-600 dark:text-gray-400">First Seen:</span> <span class="text-gray-800 dark:text-gray-200">${details.first_seen_at ? new Date(details.first_seen_at).toLocaleString() : 'N/A'}</span></div>
                                <div><span class="font-bold text-gray-600 dark:text-gray-400">Updated At:</span> <span class="text-gray-800 dark:text-gray-200">${new Date(details.updated_at).toLocaleString()}</span></div>
                            </div>
                        `;
                    } else if (details && details.error) {
                        detailsHtml = `<div class="mt-3 text-sm text-red-500 dark:text-red-400 text-center bg-red-50 dark:bg-red-900/20 p-2 rounded">Failed to load details</div>`;
                    } else {
                        detailsHtml = `<div class="mt-3 text-sm text-gray-500 dark:text-gray-400 text-center p-2">Loading details...</div>`;
                    }
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex flex-col">
                            <span class="text-sm font-mono text-gray-800 dark:text-gray-100 font-bold">${escapeHtml(agent.agent_id)}</span>
                            <div class="flex items-center space-x-2 mt-2">
                                <span class="relative inline-block px-2 py-1 font-semibold leading-tight rounded-full text-xs ${getStatusColor(agent.status)}">${escapeHtml(agent.status)}</span>
                                <span class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 px-2 py-1 rounded text-xs truncate max-w-[120px]" title="${escapeHtml(branchStr)}">${escapeHtml(branchStr)}</span>
                            </div>
                        </div>
                        <span class="text-xs text-gray-500 dark:text-gray-400 font-medium">${timeStr}</span>
                    </div>

                    <div class="text-sm text-gray-800 dark:text-gray-200 space-y-2 mt-3">
                        <div class="flex"><span class="font-semibold text-gray-600 dark:text-gray-400 w-20 flex-shrink-0">Location:</span> <span class="truncate">${escapeHtml(shortLocation)}</span></div>
                        <div class="flex"><span class="font-semibold text-gray-600 dark:text-gray-400 w-20 flex-shrink-0">Task:</span> <span class="break-words">${escapeHtml(agent.task_name)}</span></div>
                        <div class="flex"><span class="font-semibold text-gray-600 dark:text-gray-400 w-20 flex-shrink-0">Run ID:</span> <span class="text-xs font-mono text-gray-500 dark:text-gray-400 truncate mt-0.5">${escapeHtml(agent.run_id)}</span></div>
                        <div class="flex items-center pt-1">
                            <span class="font-semibold text-gray-600 dark:text-gray-400 w-20 flex-shrink-0">Progress:</span>
                            <div class="flex-1 flex items-center space-x-2">
                                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                                    <div class="bg-blue-600 dark:bg-blue-500 h-2 rounded-full" style="width: ${progress}%"></div>
                                </div>
                                <span class="text-xs text-gray-600 dark:text-gray-400 w-8 text-right">${progress}%</span>
                            </div>
                        </div>
                        <div class="flex pt-1">
                            <span class="font-semibold text-gray-600 dark:text-gray-400 w-20 flex-shrink-0">Message:</span> 
                            <span class="break-words text-gray-700 dark:text-gray-300">${escapeHtml(agent.message || '-')}</span>
                        </div>
                    </div>

                    <div class="pt-3 mt-3 border-t border-gray-100 dark:border-gray-700 flex justify-end">
                        <button class="details-btn text-blue-600 dark:text-blue-400 text-sm font-medium focus:outline-none px-3 py-1.5 bg-blue-50 dark:bg-blue-900/30 hover:bg-blue-100 dark:hover:bg-blue-900/50 rounded transition-colors">
                            ${isExpanded ? 'Hide Details' : 'Show Details'}
                        </button>
                    </div>

                    ${detailsHtml}
                `;
                
                const detailsBtn = card.querySelector('.details-btn');
                detailsBtn.addEventListener('click', () => toggleDetails(instanceId));

                mobileContainer.appendChild(card);
            });
        }

        async function fetchInitialState() {
            try {
                const response = await fetch('/api/agents');
                const data = await response.json();
                data.forEach(agent => agents.set(agent.instance_id || agent.agent_id, agent));
                renderAgents();
            } catch (err) {
                console.error("Failed to fetch initial state", err);
            }
        }

        function connectSSE() {
            const eventSource = new EventSource('/api/stream');
            
            eventSource.addEventListener('status_update', (event) => {
                const data = JSON.parse(event.data);
                agents.set(data.instance_id || data.agent_id, data);
                renderAgents();
            });

            eventSource.onerror = (err) => {
                console.error("SSE connection error, retrying...", err);
                eventSource.close();
                setTimeout(connectSSE, 3000);
            };
        }

        fetchInitialState();
        connectSSE();

        // Theme toggle logic
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('dashboard-theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>
</html>
